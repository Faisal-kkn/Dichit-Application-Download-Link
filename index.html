<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Dichit</title>
    <meta
      name="description"
      content="Download Dichit for iPhone or Android, or continue to the Dichit website."
    />
    <style>
      :root {
        color-scheme: light;
        --text: #111827;
        --muted: #5f6b7a;
        --primary: #0cb899;
        --primary-rgb: 12, 184, 153;
        --accent: #f7b731;
        --sky: #2dd4bf;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        padding: 24px;
        background:
          radial-gradient(circle at 22% 24%, rgba(var(--primary-rgb), 0.22), transparent 28%),
          radial-gradient(circle at 76% 18%, rgba(247, 183, 49, 0.22), transparent 24%),
          radial-gradient(circle at 52% 76%, rgba(var(--primary-rgb), 0.18), transparent 30%),
          linear-gradient(145deg, #f8fffd 0%, #e9fbf7 48%, #fff8e8 100%);
        color: var(--text);
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          sans-serif;
      }

      main {
        width: min(100%, 460px);
        position: relative;
        z-index: 1;
        text-align: center;
      }

      .logo {
        width: 100px;
        height: 100px;
        position: relative;
        margin: 0 auto 30px;
        display: grid;
        place-items: center;
        border-radius: 24px;
        background: #ffffff;
        color: #ffffff;
        box-shadow:
          0 22px 46px rgba(var(--primary-rgb), 0.3),
          inset 0 0 0 1px rgba(var(--primary-rgb), 0.12);
        font-size: 42px;
        font-weight: 800;
        animation: float 2.2s ease-in-out infinite;
      }

      .logo::before,
      .logo::after {
        content: "";
        position: absolute;
        inset: -12px;
        border: 2px solid rgba(var(--primary-rgb), 0.24);
        border-radius: 30px;
        animation: pulse 1.8s ease-out infinite;
      }

      .logo::after {
        animation-delay: 0.45s;
      }

      h1 {
        margin: 0;
        font-size: 36px;
        line-height: 1.15;
        letter-spacing: 0;
      }

      p {
        margin: 12px 0 0;
        color: var(--muted);
        font-size: 16px;
        line-height: 1.6;
      }

      .status {
        min-height: 24px;
        margin-top: 24px;
        font-size: 14px;
      }

      .loader {
        width: min(100%, 280px);
        height: 8px;
        margin: 30px auto 0;
        overflow: hidden;
        border-radius: 999px;
        background: rgba(var(--primary-rgb), 0.12);
      }

      .loader::before {
        content: "";
        display: block;
        width: 42%;
        height: 100%;
        border-radius: inherit;
        background: linear-gradient(90deg, var(--primary), var(--sky), var(--accent));
        animation: load 1.15s ease-in-out infinite;
      }

      .orbit {
        position: absolute;
        width: 190px;
        height: 190px;
        border: 1px solid rgba(var(--primary-rgb), 0.18);
        border-radius: 999px;
        animation: spin 8s linear infinite;
        pointer-events: none;
      }

      .orbit.one {
        top: 12%;
        left: 14%;
      }

      .orbit.two {
        right: 12%;
        bottom: 14%;
        width: 150px;
        height: 150px;
        animation-duration: 10s;
        animation-direction: reverse;
      }

      .orbit::before {
        content: "";
        position: absolute;
        top: 18px;
        left: 24px;
        width: 12px;
        height: 12px;
        border-radius: 50%;
        background: var(--primary);
      }

      .orbit.two::before {
        background: var(--accent);
      }

      .img-fluid {
        width: 72px;
        height: 72px;
        object-fit: contain;
        display: block;
      }

      .skip-link {
        margin-top: 18px;
        display: inline-flex;
        color: var(--primary);
        font-size: 14px;
        font-weight: 700;
        text-decoration: none;
      }

      .skip-link:hover {
        text-decoration: underline;
      }

      @keyframes float {
        0%,
        100% {
          transform: translateY(0);
        }

        50% {
          transform: translateY(-10px);
        }
      }

      @keyframes pulse {
        0% {
          opacity: 0.72;
          transform: scale(0.88);
        }

        100% {
          opacity: 0;
          transform: scale(1.28);
        }
      }

      @keyframes load {
        0% {
          transform: translateX(-110%);
        }

        100% {
          transform: translateX(250%);
        }
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      @media (max-width: 420px) {
        body {
          padding: 16px;
        }

        main {
          padding: 26px 20px;
        }

        h1 {
          font-size: 30px;
        }

        .orbit {
          opacity: 0.45;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          animation-duration: 0.01ms !important;
          animation-iteration-count: 1 !important;
          scroll-behavior: auto !important;
        }
      }
    </style>
    <script type="text/javascript">
      (function () {
        var links = {
          ios: "https://apps.apple.com/us/app/dichit/id6770840206",
          android: "https://play.google.com/store/apps/details?id=com.dichit",
          website: "https://dichit.money",
        };

        function getDestination() {
          var userAgent = navigator.userAgent || navigator.vendor || window.opera || "";
          var isAndroid = /android/i.test(userAgent);
          var isIos = /iPad|iPhone|iPod/.test(userAgent) && !window.MSStream;
          var isIpadOs =
            navigator.platform === "MacIntel" && navigator.maxTouchPoints > 1;

          if (isAndroid) return links.android;
          if (isIos || isIpadOs) return links.ios;

          return links.website;
        }

        window.addEventListener("DOMContentLoaded", function () {
          var destination = getDestination();
          var status = document.getElementById("redirect-status");
          var skipLink = document.getElementById("skip-link");

          if (status) {
            status.textContent = "Redirecting you now...";
          }

          if (skipLink) {
            skipLink.href = destination;
          }

          window.setTimeout(function () {
            window.location.replace(destination);
          }, 900);
        });
      })();
    </script>
  </head>
  <body>
    <div class="orbit one" aria-hidden="true"></div>
    <div class="orbit two" aria-hidden="true"></div>
    <main>
      <div class="logo" aria-hidden="true">
        <img src="/logo.png" class="img-fluid" alt="Dichit logo" />
      </div>
      <h1>Opening Dichit</h1>
      <p>Finding the right app destination for your device.</p>
      <div class="loader" aria-hidden="true"></div>

      <p class="status" id="redirect-status">Preparing your redirect...</p>
      <a class="skip-link" id="skip-link" href="https://dichit.money">Continue manually</a>
      <noscript>
        <p class="status">
          JavaScript is disabled. Visit
          <a class="skip-link" href="https://dichit.money">dichit.money</a>.
        </p>
      </noscript>
    </main>
  </body>
</html>
