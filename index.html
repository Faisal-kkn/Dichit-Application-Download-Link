<!doctype html>
<html lang="en">
  <head>
    <title>Downloading Dichit App...</title>
    <script type="text/javascript">
      window.onload = function () {
        var userAgent = navigator.userAgent || navigator.vendor || window.opera;

        // iOS detection
        if (/iPad|iPhone|iPod/.test(userAgent) && !window.MSStream) {
          window.location.href = "https://apps.apple.com/us/app/dichit/id6770840206";
        }
        // Android detection
        else if (/android/i.test(userAgent)) {
          window.location.href = "https://play.google.com/store/apps/details?id=com.dichit";
        }
        // Fallback for desktop users
        else {
          window.location.href = "https://dichit.money";
        }
      };
    </script>
  </head>
  <body>
    <p>Redirecting you to the app store...</p>
  </body>
</html>
